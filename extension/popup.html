<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Connector</title>
  <style>
    :root{color-scheme:dark}
    body{width:348px;margin:0;padding:18px;font:13px/1.5 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:#edf2f7;background:#0b0d11}
    h1{margin:0 0 8px;font-size:18px;letter-spacing:.2px}
    p{margin:0 0 12px;color:rgba(237,242,247,.68)}
    .status{display:flex;align-items:flex-start;gap:10px;margin:10px 0;padding:11px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.045)}
    .dot{width:9px;height:9px;border-radius:50%;margin-top:5px;background:#f6c36a;box-shadow:0 0 18px rgba(246,195,106,.45);flex:0 0 auto}
    .status.ok .dot{background:#55d88a;box-shadow:0 0 18px rgba(85,216,138,.45)}
    .status.warn .dot{background:#ffb86b;box-shadow:0 0 18px rgba(255,184,107,.45)}
    .label{font-weight:750}
    .meta{font-size:11px;color:rgba(237,242,247,.52)}
    .soon{margin:12px 0 2px;padding:10px 11px;border-radius:8px;border:1px dashed rgba(255,255,255,.13);color:rgba(237,242,247,.62);background:rgba(255,255,255,.03)}
    button,a{display:inline-flex;align-items:center;justify-content:center;height:34px;padding:0 12px;border-radius:7px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.065);color:#fff;text-decoration:none;font-weight:700;cursor:pointer}
    .primary{background:rgba(0,245,212,.16);border-color:rgba(0,245,212,.28);color:#dffff9}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  </style>
</head>
<body>
  <h1>Mineradio Connector</h1>
  <p>连接浏览器里的音乐网页登录态，供 Mineradio Web 搜索、读取封面歌词和获取可播放地址。</p>
  <div id="netease-status" class="status">
    <span class="dot"></span>
    <div>
      <div id="netease-status-label" class="label">正在检测网易云...</div>
      <div id="netease-status-meta" class="meta">读取 music.163.com Cookie</div>
    </div>
  </div>
  <div id="qq-status" class="status">
    <span class="dot"></span>
    <div>
      <div id="qq-status-label" class="label">正在检测 QQ 音乐...</div>
      <div id="qq-status-meta" class="meta">读取 y.qq.com Cookie</div>
    </div>
  </div>
  <div id="kugou-status" class="status">
    <span class="dot"></span>
    <div>
      <div id="kugou-status-label" class="label">正在检测酷狗...</div>
      <div id="kugou-status-meta" class="meta">读取 kugou.com Cookie</div>
    </div>
  </div>
  <div class="soon">Apple Music、汽水音乐等渠道正在加入中；只有能稳定搜索并获取播放内容后才会进入播放器。</div>
  <div class="actions">
    <a class="primary" href="https://mrchenyh.github.io/Mineradio-Web/" target="_blank" rel="noreferrer">打开播放器</a>
    <a href="https://music.163.com/" target="_blank" rel="noreferrer">打开网易云</a>
    <a href="https://y.qq.com/" target="_blank" rel="noreferrer">打开 QQ 音乐</a>
    <a href="https://www.kugou.com/" target="_blank" rel="noreferrer">打开酷狗</a>
    <button id="refresh" type="button">刷新状态</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
