name: Build Bridge Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  bridge-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run package:bridge:win
      - uses: actions/upload-artifact@v4
        with:
          name: Mineradio-Bridge-win-x64
          path: release/Mineradio-Bridge-win-x64.zip
