name: Build Bridge Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.1.0
        required: false
        default: v0.1.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  bridge-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run package:bridge:win
      - uses: actions/upload-artifact@v4
        with:
          name: Mineradio-Bridge-win-x64
          path: release/Mineradio-Bridge-win-x64.zip
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version || 'v0.1.0' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Mineradio Bridge ${{ steps.release_tag.outputs.tag }}
          files: release/Mineradio-Bridge-win-x64.zip
          make_latest: true
          body: |
            Windows Bridge for Mineradio Web.

            1. Download and unzip `Mineradio-Bridge-win-x64.zip`.
            2. Double-click `Start-Mineradio-Bridge.cmd`.
            3. Open `http://127.0.0.1:37891/pair` to pair the web player.
